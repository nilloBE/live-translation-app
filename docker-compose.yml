services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      NODE_ENV: development
      PORT: 3001
      SPEECH_REGION: ${SPEECH_REGION:-westeurope}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://localhost:5174}
    ports:
      - "3001:3001"
    volumes:
      - ${USERPROFILE:-${HOME}}/.azure:/root/.azure:ro

  client-speaker:
    image: node:20-alpine
    working_dir: /workspace
    command: sh -c "npm install && npm run dev --workspace @live-translation/client-speaker -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3001}
    ports:
      - "5173:5173"
    volumes:
      - ./:/workspace
      - node-modules:/workspace/node_modules
    depends_on:
      - server

  client-audience:
    image: node:20-alpine
    working_dir: /workspace
    command: sh -c "npm install && npm run dev --workspace @live-translation/client-audience -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3001}
    ports:
      - "5174:5174"
    volumes:
      - ./:/workspace
      - node-modules:/workspace/node_modules
    depends_on:
      - server

volumes:
  node-modules:
